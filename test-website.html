<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нужен ли вашему бизнесу сайт? — Order & Profit</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#f5f3ef;color:#1a1a1a;font-family:"Montserrat",sans-serif;min-height:100vh}

.nav{position:fixed;top:0;left:0;right:0;z-index:200;background:#fff;border-bottom:2px solid #e8e2d8;display:flex;align-items:center;padding:0 20px;height:56px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.nav-logo{font-family:"Playfair Display",serif;font-size:20px;font-weight:700;color:#1a1a1a;letter-spacing:3px}
.nav-logo span{color:#c9a84c}
.nav-tag{margin-left:16px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#999;border-left:1px solid #ddd;padding-left:16px;font-weight:600}
.nav-back{margin-left:auto;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#1a1a1a;text-decoration:none;background:#f0ebe0;border:2px solid #c9a84c;padding:7px 14px;transition:all .2s}
.nav-back:hover{background:#c9a84c;color:#fff}

.wrap{max-width:560px;margin:0 auto;padding:72px 20px 80px}

.intro{text-align:center;padding-top:40px}
.intro-tag{display:inline-block;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#fff;background:#c9a84c;padding:6px 18px;margin-bottom:28px;font-weight:700}
.intro h1{font-family:"Playfair Display",serif;font-size:clamp(28px,6vw,42px);font-weight:900;line-height:1.15;color:#1a1a1a;margin-bottom:16px}
.intro h1 em{color:#c9a84c;font-style:italic}
.intro p{font-size:15px;color:#666;line-height:1.75;max-width:380px;margin:0 auto 36px}
.btn-start{background:#1a1a1a;color:#fff;border:none;padding:18px 44px;font-family:"Montserrat",sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background .2s}
.btn-start:hover{background:#c9a84c}
.intro-note{margin-top:14px;font-size:12px;color:#aaa}

.prog-block{display:none;padding-top:20px}
.prog-row{display:flex;justify-content:space-between;margin-bottom:8px}
.prog-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#999;font-weight:600}
.prog-count{font-size:12px;color:#c9a84c;font-weight:700}
.prog-bar{height:3px;background:#e0dbd0;border-radius:2px}
.prog-fill{height:100%;background:#c9a84c;border-radius:2px;transition:width .4s ease;width:0%}

.chat{display:none;flex-direction:column;padding-top:20px}
.bot-row{display:flex;gap:12px;margin-bottom:8px;animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bot-av{width:40px;height:40px;border-radius:50%;background:#1a1a1a;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#c9a84c;border:2px solid #c9a84c;font-family:"Playfair Display",serif}
.bot-bub{background:#fff;border:1px solid #e0dbd0;border-radius:4px 16px 16px 16px;padding:14px 18px;font-size:15px;line-height:1.7;color:#2a2a2a;max-width:calc(100% - 52px);box-shadow:0 2px 8px rgba(0,0,0,.06);font-family:"Playfair Display",serif}
.bot-bub strong{color:#1a1a1a;font-weight:700}
.typing{display:flex;gap:5px;padding:6px 2px;align-items:center}
.typing span{width:8px;height:8px;border-radius:50%;background:#ccc;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
.user-row{display:flex;justify-content:flex-end;margin-bottom:8px;animation:fadeUp .25s ease both}
.user-bub{background:#c9a84c;border-radius:16px 4px 16px 16px;padding:12px 18px;font-size:14px;color:#fff;max-width:76%;font-weight:500}

.opts{display:none;flex-direction:column;gap:10px;padding-top:12px}
.opt{background:#fff;border:2px solid #e0dbd0;border-radius:8px;padding:14px 20px;font-family:"Montserrat",sans-serif;font-size:14px;color:#1a1a1a;cursor:pointer;text-align:left;font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:all .15s}
.opt:hover{border-color:#c9a84c;background:#faf7f0}
.opt.sel{border-color:#c9a84c;background:#fdf9f0;color:#8a6a1a;cursor:default}

.result{display:none;padding-top:20px;animation:fadeUp .4s ease both}
.res-card{border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.res-head{padding:28px 24px 20px;border-bottom:1px solid rgba(0,0,0,.08)}
.res-verdict{font-size:10px;letter-spacing:4px;text-transform:uppercase;font-weight:700;margin-bottom:12px}
.res-title{font-family:"Playfair Display",serif;font-size:24px;font-weight:900;line-height:1.2;margin-bottom:10px}
.res-sub{font-size:14px;line-height:1.7;opacity:.8}
.res-body{padding:20px 24px;background:#fff;border-bottom:1px solid #f0ebe0}
.res-body-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#999;font-weight:700;margin-bottom:14px}
.reason{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
.reason-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.reason-text{font-size:14px;color:#444;line-height:1.6}
.res-rec{padding:20px 24px;background:#fdf9f0;border-bottom:1px solid #f0ebe0}
.rec-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#c9a84c;font-weight:700;margin-bottom:8px}
.rec-text{font-size:14px;color:#333;line-height:1.7}
.res-cta{padding:24px;background:#fff;text-align:center}
.cta-text{font-size:14px;color:#666;margin-bottom:20px;line-height:1.6}
.btn-cta{display:block;width:100%;background:#1a1a1a;color:#fff;border:none;padding:16px;font-family:"Montserrat",sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;text-decoration:none;border-radius:6px;margin-bottom:12px;transition:background .2s}
.btn-cta:hover{background:#c9a84c}
.cta-note{font-size:11px;color:#bbb}

@media(max-width:500px){.nav-tag{display:none}.bot-bub{font-size:14px}.opt{font-size:13px;padding:13px 16px}}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">O<span>|</span>P</div>
  <div class="nav-tag">Диагностика</div>
  <a class="nav-back" href="https://xugushik-source.github.io/order-profit-/">← Сайт</a>
</nav>

<div class="wrap">
  <div class="intro" id="intro">
    <div class="intro-tag">Order & Profit · Тест</div>
    <h1>Нужен ли вашему<br>бизнесу <em>сайт?</em></h1>
    <p>6 вопросов — и вы узнаете: сайт для вас это точка роста или лишние расходы прямо сейчас.</p>
    <button class="btn-start" onclick="start()">Пройти тест →</button>
    <p class="intro-note">Займёт 2 минуты · Результат сразу</p>
  </div>

  <div class="prog-block" id="prog">
    <div class="prog-row">
      <span class="prog-label">Диагностика</span>
      <span class="prog-count" id="pc">1 / 6</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
  </div>

  <div class="chat" id="chat"></div>
  <div class="opts" id="opts"></div>
  <div class="result" id="result"></div>
</div>

<script>
var Q=[
  {q:"Как клиенты <strong>находят вас</strong> прямо сейчас?",opts:[{l:"Только через знакомых — сарафан",s:2},{l:"Instagram или Facebook",s:1},{l:"Google Maps",s:1},{l:"Несколько каналов сразу",s:0}]},
  {q:"Когда клиент хочет узнать о вас больше — <strong>куда он идёт?</strong>",opts:[{l:"Некуда — нет ни сайта, ни нормального профиля",s:3},{l:"В Instagram — там есть информация",s:1},{l:"Пишет мне лично в WhatsApp",s:2},{l:"На сайт — он уже есть",s:0}]},
  {q:"Есть ли у вас <strong>клиенты из других городов или стран</strong>?",opts:[{l:"Да, или хочу их привлечь",s:3},{l:"Пока только местные",s:1},{l:"Нет и не планирую",s:0}]},
  {q:"Сложно ли объяснить клиенту <strong>что вы делаете и сколько стоит</strong>?",opts:[{l:"Да — каждый раз объясняю одно и то же",s:3},{l:"Иногда приходится объяснять",s:1},{l:"Нет — всё понятно и так",s:0}]},
  {q:"Есть ли у вас <strong>несколько услуг или товаров</strong> которые нужно показать?",opts:[{l:"Да — много позиций",s:2},{l:"Есть несколько",s:1},{l:"Одна услуга или один продукт",s:0}]},
  {q:"Планируете работать с <strong>инвесторами, грантами или крупными клиентами</strong>?",opts:[{l:"Да, это важно для меня",s:3},{l:"Возможно в будущем",s:1},{l:"Нет, только обычные клиенты",s:0}]}
];

var R=[
  {range:[0,3],color:"#27ae60",headBg:"#f0faf4",headColor:"#1a1a1a",verdict:"Сайт пока не приоритет",title:"Сначала укрепите то, что уже работает",sub:"Ваш бизнес пока не упирается в отсутствие сайта. Деньги и время лучше вложить в другое.",reasons:["Клиенты находят вас без сайта","Нет запроса от инвесторов или внешних рынков","Продукт простой — достаточно одного канала"],rec:"Сначала доведите до ума Instagram и Google Maps. Это даст больший эффект быстрее и дешевле чем сайт.",cta:"Посмотреть услуги по упаковке"},
  {range:[4,8],color:"#e67e22",headBg:"#fff8f0",headColor:"#1a1a1a",verdict:"Сайт был бы полезен",title:"Вы теряете клиентов без точки доверия",sub:"У вас уже есть запрос — но клиентам некуда пойти чтобы узнать о вас подробнее. Это тормозит продажи.",reasons:["Часть клиентов уходит не найдя информацию","Сложно объяснить услуги без единой страницы","Потенциал для роста есть — сайт ускорит его"],rec:"Начните с простого лендинга — одна страница с услугами, ценами и контактами. Это решит 80% проблемы.",cta:"Посмотреть стоимость лендинга"},
  {range:[9,14],color:"#c9a84c",headBg:"#1a1a1a",headColor:"#fff",verdict:"Сайт нужен — и срочно",title:"Без сайта вы теряете деньги каждый день",sub:"Ваши ответы показывают: вы уже переросли Instagram. Клиенты, инвесторы и партнёры ищут вас — и не находят.",reasons:["Нет единой точки где клиент видит всё о вас","Без сайта инвесторы не воспринимают серьёзно","Вы объясняете одно и то же вручную — сайт делает это автоматически","Несколько услуг требуют отдельной площадки"],rec:"Лендинг или полноценный сайт — зависит от задачи. Но начать нужно сейчас. Каждый месяц без сайта — упущенные клиенты.",cta:"Посмотреть цены на сайт"}
];

var cur=0,score=0,locked=false;

function $(id){return document.getElementById(id)}
function scrollBot(){setTimeout(function(){window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})},60)}

function start(){
  $('intro').style.display='none';
  $('prog').style.display='block';
  $('chat').style.display='flex';
  $('chat').style.flexDirection='column';
  showQ(0);
}

function upProg(idx){
  $('pf').style.width=(idx/Q.length*100)+'%';
  $('pc').textContent=(idx+1)+' / '+Q.length;
}

function showQ(idx){
  upProg(idx);
  locked=true;
  $('opts').style.display='none';
  $('opts').innerHTML='';
  var tr=makeBot(true);
  $('chat').appendChild(tr);
  scrollBot();
  setTimeout(function(){
    tr.remove();
    $('chat').appendChild(makeBot(false,Q[idx].q));
    Q[idx].opts.forEach(function(o){
      var b=document.createElement('button');
      b.className='opt';
      b.textContent=o.l;
      b.onclick=function(){if(!locked)pick(b,o,idx)};
      $('opts').appendChild(b);
    });
    $('opts').style.display='flex';
    $('opts').style.flexDirection='column';
    locked=false;
    scrollBot();
  },700);
}

function makeBot(typing,html){
  var row=document.createElement('div');
  row.className='bot-row';
  var av=document.createElement('div');
  av.className='bot-av';
  av.textContent='O&P';
  var bub=document.createElement('div');
  bub.className='bot-bub';
  bub.innerHTML=typing?'<div class="typing"><span></span><span></span><span></span></div>':html;
  row.appendChild(av);
  row.appendChild(bub);
  return row;
}

function pick(btn,opt,idx){
  locked=true;
  $('opts').querySelectorAll('.opt').forEach(function(b){b.disabled=true});
  btn.classList.add('sel');
  score+=opt.s;
  setTimeout(function(){
    $('opts').style.display='none';
    $('opts').innerHTML='';
    var ur=document.createElement('div');
    ur.className='user-row';
    var ub=document.createElement('div');
    ub.className='user-bub';
    ub.textContent=btn.textContent;
    ur.appendChild(ub);
    $('chat').appendChild(ur);
    scrollBot();
    cur++;
    if(cur<Q.length){setTimeout(function(){showQ(cur)},400)}
    else{setTimeout(showResult,500)}
  },300);
}

function showResult(){
  $('pf').style.width='100%';
  $('pc').textContent=Q.length+' / '+Q.length;
  var tr=makeBot(true);
  $('chat').appendChild(tr);
  scrollBot();
  setTimeout(function(){
    tr.remove();
    $('chat').appendChild(makeBot(false,'Готово. Анализирую ваши ответы...'));
    scrollBot();
    setTimeout(renderRes,800);
  },700);
}

function renderRes(){
  var r=R[R.length-1];
  for(var i=0;i<R.length;i++){if(score>=R[i].range[0]&&score<=R[i].range[1]){r=R[i];break}}
  var w=$('result');
  w.style.display='block';
  w.innerHTML=
    '<div class="res-card">'+
      '<div class="res-head" style="background:'+r.headBg+';color:'+r.headColor+'">'+
        '<div class="res-verdict" style="color:'+r.color+'">'+r.verdict+'</div>'+
        '<div class="res-title">'+r.title+'</div>'+
        '<div class="res-sub">'+r.sub+'</div>'+
      '</div>'+
      '<div class="res-body">'+
        '<div class="res-body-title">Почему так</div>'+
        r.reasons.map(function(re){return'<div class="reason"><div class="reason-dot" style="background:'+r.color+'"></div><div class="reason-text">'+re+'</div></div>'}).join('')+
      '</div>'+
      '<div class="res-rec"><div class="rec-label">Рекомендация</div><div class="rec-text">'+r.rec+'</div></div>'+
      '<div class="res-cta">'+
        '<div class="cta-text">Хотите разобрать именно вашу ситуацию?<br>15 минут — конкретный первый шаг. Бесплатно.</div>'+
        '<a class="btn-cta" href="https://xugushik-source.github.io/order-profit-/#page-services" target="_blank">'+r.cta+' →</a>'+
        '<div class="cta-note">Order & Profit · Akhalkalaki, Georgia</div>'+
      '</div>'+
    '</div>';
  scrollBot();
}
</script>
</body>
</html>
